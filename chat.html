<!DOCTYPE html>
<html>
<head>
    <title>Journal Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2>AI Reflection</h2>

        <div id="chat"
             class="glass"
             style="height:60vh; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;">
        </div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <input id="msg" placeholder="Write your thoughts...">
            <button onclick="send()">Send</button>
        </div>

    </div>
   <script src="api.js"></script>
   
</body>
</html>
