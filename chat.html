<!DOCTYPE html>
<html>
<head>
    <title>AI Reflection – JournalAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="dash-header">
        <h2>AI Reflection</h2>
        <button class="back-btn" onclick="goBack()">← Back</button>
    </div>

    <div id="chat" class="glass"></div>

    <div class="chat-bar">
        <input id="msg" placeholder="Write your thoughts…" onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>

</div>
<script src="api.js"></script>
</body>
</html>
