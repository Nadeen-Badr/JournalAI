<!DOCTYPE html>
<html>
<head>
    <title>Dashboard – JournalAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="dash-header">
        <h2>My Journal</h2>
    </div>

    <div class="glass journal-form">
        <h3>New Entry</h3>
        <input id="journalTitle" placeholder="Give your entry a title…">
        <textarea id="journalContent" placeholder="What's on your mind today?"></textarea>

        <div class="mood-picker">
            <button class="mood-btn" onclick="selectMood('Happy')">😊 Happy</button>
            <button class="mood-btn" onclick="selectMood('Calm')">😌 Calm</button>
            <button class="mood-btn" onclick="selectMood('Neutral')">😐 Neutral</button>
            <button class="mood-btn" onclick="selectMood('Sad')">😔 Sad</button>
            <button class="mood-btn" onclick="selectMood('Stressed')">😣 Stressed</button>
        </div>

        <button onclick="createJournal()">✦ Create Entry</button>
    </div>

    <p class="section-label">Recent Entries</p>
    <div id="list"></div>

</div>
<script src="api.js"></script>
</body>
</html>
